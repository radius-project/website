# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Spellcheck

on:
  workflow_dispatch:
  push:
    branches:
      - v*.*
      - edge
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - v*.*
      - edge

permissions: {}

env:
  ACTION_LINK: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

concurrency:
  group: spellcheck-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup NodeJS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install cspell
        run: npm install -g cspell

      - name: Spellcheck
        run: cspell lint --config ./.github/configs/.cspell.yml --no-progress --dot "**/*.md"

      - name: Post GitHub workflow output on failure
        if: failure()
        run: |
          {
            echo "## :x: Spellcheck Failed"
            echo "There are spelling errors in your PR. Visit [the workflow output](${{ env.ACTION_LINK }}) to see what words are failing."
            echo "### Adding new words"
            echo "You can add new custom words to [.cspellignore](https://github.com/radius-project/website/blob/main/.cspellignore)."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Post GitHub workflow output on success
        run: |
          {
            echo "## :white_check_mark: Spellcheck Passed"
            echo "There are no spelling errors in your PR."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Post GitHub comment on failure
        if: failure()
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: spellcheck
          recreate: true
          message: |
            ## :x: Spellcheck Failed
            There are spelling errors in your PR. Visit [the workflow output](${{ env.ACTION_LINK }}) to see what words are failing.
            ### Adding new words
            You can add new custom words to [.cspellignore](https://github.com/radius-project/website/blob/main/.cspellignore).

      - name: Clear GitHub comment on success
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        continue-on-error: true
        with:
          header: spellcheck
          delete: true
